# Staging-like Web Compose
#
# Purpose:
#   Run the frontend with staging environment values.
#   This is useful for testing the web app against staging API/services.
#
# Usage:
#   docker network create peridotvault-local-network
#   docker compose -f docker-compose.staging.yml up -d --build
#
# Access:
#   Web: http://localhost:3000

services:
  web:
    image: ${WEB_IMAGE:-peridotvault-web:staging-local}

    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        PORT: 3000
        HOSTNAME: 0.0.0.0

        # NEXT_PUBLIC_* values are compiled into the Next.js browser bundle.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.staging.peridotvault.com}
        API_BASE_URL: ${API_BASE_URL:-https://api.staging.peridotvault.com}
        NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL:-https://web.staging.peridotvault.com}

    container_name: peridotvault-web-staging-local

    ports:
      - "${PORT:-3000}:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0

      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.staging.peridotvault.com}
      API_BASE_URL: ${API_BASE_URL:-https://api.staging.peridotvault.com}
      NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL:-https://web.staging.peridotvault.com}

    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped

    networks:
      - peridotvault-local-network

networks:
  peridotvault-local-network:
    name: peridotvault-local-network
    external: true
