name: Deploy Testnet

on:
  push:
    branches: [testnet]
  workflow_dispatch:

concurrency:
  group: deploy-testnet-web-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/peridotvault-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Infisical CLI
        run: |
          curl -1sLf "https://artifacts-cli.infisical.com/setup.deb.sh" | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical

      - name: Log in to GHCR from Infisical
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          if [ -z "$INFISICAL_CLIENT_ID" ]; then
            echo "::error::Missing GitHub Actions secret: INFISICAL_CLIENT_ID"
            exit 1
          fi
          if [ -z "$INFISICAL_CLIENT_SECRET" ]; then
            echo "::error::Missing GitHub Actions secret: INFISICAL_CLIENT_SECRET"
            exit 1
          fi
          INFISICAL_PROJECT_ID=$(sed -n 's/.*"workspaceId"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' .infisical.json | head -1)
          INFISICAL_TOKEN=$(infisical login --method=universal-auth --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" --silent --plain)
          INFISICAL_TOKEN="$INFISICAL_TOKEN" infisical run --projectId="$INFISICAL_PROJECT_ID" --env=testnet --path=/infra -- sh -c 'printf "%s" "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin'

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=testnet
            type=sha,prefix=testnet-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.testnet.peridotvault.com
            API_BASE_URL=https://api.testnet.peridotvault.com
            NEXT_PUBLIC_STORE_URL=https://web.testnet.peridotvault.com
            NEXT_PUBLIC_ENVIRONMENT=testnet

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to VPS via SSH
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_USERNAME: ${{ secrets.PROD_VPS_USERNAME }}
          VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT || '22' }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          for i in {1..3}; do
            echo "Attempt $i/3: Connecting to $VPS_HOST..."
            if ssh -i ~/.ssh/deploy_key \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=60 \
                -o ConnectionAttempts=3 \
                -p "$VPS_PORT" \
                "$VPS_USERNAME@$VPS_HOST" \
                "set -e
                cd /home/peridot/peridotvault-infra
                git pull
                export INFISICAL_INFRA_TOKEN=\$(infisical login --method=universal-auth --client-id='$INFISICAL_CLIENT_ID' --client-secret='$INFISICAL_CLIENT_SECRET' --silent --plain)
                make deploy-testnet
                make ps-testnet"
            then
              echo "✅ Deployment successful on attempt $i"
              exit 0
            fi
            echo "❌ Attempt $i failed, waiting 30 seconds before retry..."
            sleep 30
          done
          echo "❌ All 3 attempts failed"
          exit 1
